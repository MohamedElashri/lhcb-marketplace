name: MCP Live Checks

on:
  workflow_dispatch:
  schedule:
    - cron: "23 5 * * 1"

permissions:
  contents: read

jobs:
  live:
    name: Public MCP smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.21"
          python-version: "3.12"
          enable-cache: true

      - name: Install locked test dependencies
        run: uv sync --locked --all-groups

      - name: Verify published pins and hashes
        run: uv run python scripts/check_mcp_releases.py

      - name: Initialize, list tools, query public APIs, and test ROOT boundary
        env:
          UV_TOOL_DIR: ${{ runner.temp }}/uv-tools
        run: uv run python scripts/smoke_mcp.py --all --live --timeout 120
